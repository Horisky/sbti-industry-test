<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行业SBTI｜你的职场人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon:#a855f7;--nr:168,85,247;--bg:#08080f;--card:#12121f;--text:#e2e8f0;--sub:#94a3b8}
html,body{width:100%;min-height:100vh;font-family:-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(168,85,247,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(6,182,212,.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;z-index:1;display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(30px);pointer-events:none;transition:opacity .4s,transform .4s}
.screen.active{opacity:1;transform:translateY(0);pointer-events:auto;z-index:2}
.container{width:100%;max-width:480px;padding:20px 24px;flex:1;display:flex;flex-direction:column}
.home-header{text-align:center;padding:50px 0 16px}
.home-title{font-size:40px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#a855f7,#06b6d4,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;animation:gl 4s infinite}
.home-title span{display:block;font-size:15px;letter-spacing:4px;background:linear-gradient(90deg,var(--sub),var(--text));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:4px;font-weight:400}
@keyframes gl{0%,92%,100%{transform:none}93%{transform:translate(-2px,1px)}95%{transform:translate(2px,-1px)}}
.home-slogan{text-align:center;color:var(--sub);font-size:14px;margin:14px 0 32px;letter-spacing:1px;line-height:1.6}
.home-slogan em{font-style:normal;color:var(--neon)}
.industry-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:30px}
.industry-card{background:var(--card);border:1px solid rgba(255,255,255,.04);border-radius:16px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .3s;position:relative}
.industry-card:active{border-color:rgba(var(--nr),.27);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.25),0 0 15px rgba(var(--nr),.2)}
.industry-card .ic{font-size:30px;margin-bottom:6px;display:block}
.industry-card .nm{font-size:14px;font-weight:600}
.home-footer{text-align:center;padding:16px 0 40px;color:rgba(255,255,255,.1);font-size:11px;letter-spacing:1px}
.quiz-top{padding:20px 0 12px;display:flex;align-items:center;gap:12px}
.quiz-back{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);font-size:18px;transition:all .3s;flex-shrink:0}
.quiz-ind{font-size:13px;color:var(--sub);flex:1}
.quiz-num{font-size:13px;color:var(--neon);font-weight:700;flex-shrink:0}
.pbar-w{width:100%;height:3px;background:rgba(255,255,255,.03);border-radius:2px;margin-bottom:28px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,var(--neon),#06b6d4);border-radius:2px;transition:width .4s}
.q-area{flex:1;display:flex;flex-direction:column}
.q-text{font-size:17px;font-weight:700;line-height:1.7;margin-bottom:24px;min-height:50px;transition:opacity .3s,transform .3s}
.q-text.fo{opacity:0;transform:translateX(-20px)}
.opts{display:flex;flex-direction:column;gap:10px;transition:opacity .3s,transform .3s}
.opts.fo{opacity:0;transform:translateX(-20px)}
.ob{background:var(--card);border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:14px 18px;font-size:14px;line-height:1.6;color:var(--text);cursor:pointer;text-align:left;transition:all .25s;font-family:inherit;display:block;width:100%}
.ob:active,.ob.sel{border-color:var(--neon);background:rgba(var(--nr),.07);box-shadow:0 0 20px rgba(var(--nr),.12)}
.ol{display:inline-block;width:22px;height:22px;border-radius:50%;background:rgba(var(--nr),.1);color:var(--neon);font-size:11px;font-weight:700;line-height:22px;text-align:center;margin-right:10px;vertical-align:middle;transition:all .25s}
.ob.sel .ol{background:var(--neon);color:var(--bg)}
#result-screen{background:var(--bg)}
.rw{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px 24px;text-align:center;position:relative}
.r-ind{font-size:12px;letter-spacing:4px;color:var(--sub);margin-bottom:12px}
.r-char{margin-bottom:16px}
.r-char canvas{border-radius:16px}
.r-code{font-size:72px;font-weight:900;letter-spacing:6px;line-height:1;color:#fff;text-shadow:0 0 10px var(--neon),0 0 40px rgba(var(--nr),.3),0 0 80px rgba(var(--nr),.12);margin-bottom:6px;animation:cp 3s ease-in-out infinite;font-family:"SF Mono","Fira Code","Consolas","Courier New",monospace}
@media(min-width:400px){.r-code{font-size:90px}}
@keyframes cp{0%,100%{text-shadow:0 0 10px var(--neon),0 0 40px rgba(var(--nr),.3),0 0 80px rgba(var(--nr),.12)}50%{text-shadow:0 0 20px var(--neon),0 0 60px rgba(var(--nr),.45),0 0 120px rgba(var(--nr),.2)}}
.r-title{font-size:20px;font-weight:700;margin-bottom:20px}
.r-div{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent);margin:0 auto 20px}
.r-desc{font-size:14px;line-height:2;color:var(--sub);max-width:360px;margin:0 auto 32px;letter-spacing:.3px}
.r-share{font-size:12px;color:rgba(var(--nr),.6);letter-spacing:1px;margin-bottom:28px;padding:8px 16px;border:1px dashed rgba(var(--nr),.25);border-radius:8px;line-height:1.8}
.r-tag{position:absolute;top:20px;right:20px;font-size:10px;color:rgba(255,255,255,.06);letter-spacing:2px;writing-mode:vertical-rl}
.btn-r{background:transparent;border:1px solid rgba(var(--nr),.35);color:var(--neon);font-size:14px;padding:12px 32px;border-radius:30px;cursor:pointer;letter-spacing:2px;transition:all .3s;font-family:inherit}
.btn-r:active{background:rgba(var(--nr),.1);border-color:var(--neon)}
.r-dt,.r-db{position:absolute;width:200px;height:200px;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none}
.r-dt{top:-60px;left:-60px;background:var(--neon)}
.r-db{bottom:-60px;right:-60px;background:#06b6d4}
.r-cn{position:absolute;width:36px;height:36px;border-color:rgba(var(--nr),.15);border-style:solid}
.r-cn.tl{top:16px;left:16px;border-width:2px 0 0 2px}
.r-cn.tr{top:16px;right:16px;border-width:2px 2px 0 0}
.r-cn.bl{bottom:16px;left:16px;border-width:0 0 2px 2px}
.r-cn.br{bottom:16px;right:16px;border-width:0 2px 2px 0}
.scanlines{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:999}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(var(--nr),.15);border-radius:2px}
@media(max-width:380px){.container{padding:16px 18px}.home-title{font-size:34px}.q-text{font-size:15px}.ob{padding:12px 14px;font-size:13px}.r-code{font-size:60px}}
</style>
</head>
<body>
<div class="scanlines"></div>
<div id="home-screen" class="screen active">
<div class="container">
<div class="home-header"><div class="home-title">行业SBTI<span>你的职场人格测试</span></div></div>
<div class="home-slogan">MBTI 测性格，<em>SBTI</em> 测真实处境<br>选择你的行业，20题测出你的职场人格</div>
<div class="industry-grid" id="grid"></div>
<div class="home-footer">SBTI INDUSTRY PERSONALITY TEST // V2.0</div>
</div></div>
<div id="quiz-screen" class="screen">
<div class="container">
<div class="quiz-top"><div class="quiz-back" onclick="goHome()">&#8592;</div><div class="quiz-ind" id="qi"></div><div class="quiz-num" id="qn"></div></div>
<div class="pbar-w"><div class="pbar" id="pb"></div></div>
<div class="q-area"><div class="q-text" id="qt"></div><div class="opts" id="opts"></div></div>
</div></div>
<div id="result-screen" class="screen">
<div class="rw">
<div class="r-dt"></div><div class="r-db"></div>
<div class="r-cn tl"></div><div class="r-cn tr"></div><div class="r-cn bl"></div><div class="r-cn br"></div>
<div class="r-tag">SBTI INDUSTRY TEST</div>
<div class="r-ind" id="ri"></div>
<div class="r-char"><canvas id="cc"></canvas></div>
<div class="r-code" id="rc"></div>
<div class="r-title" id="rt"></div>
<div class="r-div"></div>
<div class="r-desc" id="rd"></div>
<div class="r-share">截图发朋友圈，看看你的朋友是什么人格</div>
<button class="btn-r" onclick="goHome()">重新测试</button>
</div></div>
<script>
/* === CHARACTER DRAWING === */
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function dot(c,x,y,r){c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();}

function drawChar(cv,ch,clr){
  var W=200,H=230;cv.width=W*2;cv.height=H*2;cv.style.width=W+'px';cv.style.height=H+'px';
  var c=cv.getContext('2d');c.scale(2,2);
  var rgb=hexRgb(clr);
  // bg glow
  var g=c.createRadialGradient(100,115,10,100,115,100);
  g.addColorStop(0,'rgba('+rgb+',0.12)');g.addColorStop(1,'transparent');
  c.fillStyle=g;c.fillRect(0,0,W,H);
  // body
  c.fillStyle=ch.sc||'#4CAF50';
  c.beginPath();c.moveTo(68,132);c.quadraticCurveTo(68,122,100,120);c.quadraticCurveTo(132,122,132,132);
  c.lineTo(135,195);c.quadraticCurveTo(135,205,100,208);c.quadraticCurveTo(65,205,65,195);c.closePath();c.fill();
  // arms
  c.fillStyle='#FFD5B8';
  rr(c,38,142,28,14,7);c.fill();rr(c,134,142,28,14,7);c.fill();
  // legs
  c.fillStyle=ch.sc||'#4CAF50';c.globalAlpha=0.7;
  rr(c,78,205,18,22,6);c.fill();rr(c,104,205,18,22,6);c.fill();c.globalAlpha=1;
  // head
  c.fillStyle='#FFD5B8';c.beginPath();c.arc(100,82,42,0,Math.PI*2);c.fill();
  // hair
  drawH(c,ch.h,100,82,42,ch.hc||'#3E2723');
  // blush
  c.fillStyle='rgba(255,180,180,0.25)';dot(c,72,92,7);dot(c,128,92,7);
  // eyes
  c.fillStyle='#333';c.strokeStyle='#333';c.lineWidth=2;c.lineCap='round';
  drawE(c,ch.e,84,80,116,80);
  // mouth
  drawM(c,ch.m,100,100);
  // prop emoji
  c.font='26px "Segoe UI Emoji","Apple Color Emoji",sans-serif';c.textAlign='center';c.textBaseline='middle';
  c.fillText(ch.p,160,128);
  // extras
  drawX(c,ch.x,clr);
}
function drawE(c,t,lx,ly,rx,ry){
  c.save();c.fillStyle='#333';c.strokeStyle='#333';c.lineWidth=2;c.lineCap='round';
  if(t==0){dot(c,lx,ly,4);dot(c,rx,ry,4);}// normal
  else if(t==1){c.beginPath();c.arc(lx,ly,6,Math.PI,0);c.stroke();c.beginPath();c.arc(rx,ry,6,Math.PI,0);c.stroke();}// happy
  else if(t==2){dot(c,lx,ly+2,3.5);dot(c,rx,ry+2,3.5);c.beginPath();c.moveTo(lx-6,ly-2);c.lineTo(lx+6,ly-2);c.stroke();c.beginPath();c.moveTo(rx-6,ry-2);c.lineTo(rx+6,ry-2);c.stroke();}// tired
  else if(t==3){c.beginPath();c.moveTo(lx-4,ly-4);c.lineTo(lx+4,ly+4);c.moveTo(lx+4,ly-4);c.lineTo(lx-4,ly+4);c.stroke();c.beginPath();c.moveTo(rx-4,ry-4);c.lineTo(rx+4,ry+4);c.moveTo(rx+4,ry-4);c.lineTo(rx-4,ry+4);c.stroke();}// dead
  else if(t==4){c.beginPath();c.arc(lx,ly,7,0,Math.PI*2);c.stroke();dot(c,lx,ly,3);c.beginPath();c.arc(rx,ry,7,0,Math.PI*2);c.stroke();dot(c,rx,ry,3);}// wide
  else if(t==5){dot(c,lx,ly,2);dot(c,rx,ry,2);}// dot
  else if(t==6){c.beginPath();c.moveTo(lx-5,ly);c.lineTo(lx+5,ly);c.stroke();c.beginPath();c.moveTo(rx-5,ry);c.lineTo(rx+5,ry);c.stroke();}// closed
  else if(t==7){c.beginPath();c.moveTo(lx-5,ly);c.lineTo(lx+5,ly);c.stroke();dot(c,rx,ry,4);}// wink
  else if(t==8){c.fillStyle='#333';var s=function(cx,cy){c.beginPath();for(var i=0;i<5;i++){var a=Math.PI/2+i*Math.PI*2/5,b=a+Math.PI/5;c.lineTo(cx+Math.cos(a)*6,cy-Math.sin(a)*6);c.lineTo(cx+Math.cos(b)*3,cy-Math.sin(b)*3);}c.closePath();c.fill();};s(lx,ly);s(rx,ry);}// star
  else if(t==9){dot(c,lx,ly,4);dot(c,rx,ry,4);c.fillStyle='#64B5F6';c.beginPath();c.moveTo(lx+5,ly+6);c.quadraticCurveTo(lx+7,ly+14,lx+3,ly+14);c.closePath();c.fill();c.beginPath();c.moveTo(rx+5,ry+6);c.quadraticCurveTo(rx+7,ry+14,rx+3,ry+14);c.closePath();c.fill();}// cry
  else if(t==10){dot(c,lx,ly,4);dot(c,rx,ry,4);c.beginPath();c.moveTo(lx-7,ly-8);c.lineTo(lx+4,ly-5);c.stroke();c.beginPath();c.moveTo(rx+7,ry-8);c.lineTo(rx-4,ry-5);c.stroke();}// angry
  c.restore();
}
function drawM(c,t,cx,cy){
  c.save();c.strokeStyle='#333';c.fillStyle='#333';c.lineWidth=2;c.lineCap='round';
  if(t==0){c.beginPath();c.arc(cx,cy-4,9,0.3,Math.PI-0.3);c.stroke();}// smile
  else if(t==1){c.beginPath();c.moveTo(cx-7,cy);c.lineTo(cx+7,cy);c.stroke();}// flat
  else if(t==2){c.beginPath();c.arc(cx,cy+8,9,Math.PI+0.3,-0.3);c.stroke();}// frown
  else if(t==3){c.beginPath();c.arc(cx,cy,5,0,Math.PI*2);c.stroke();c.globalAlpha=0.3;c.fill();c.globalAlpha=1;}// open
  else if(t==4){c.beginPath();c.arc(cx,cy-2,11,0.15,Math.PI-0.15);c.stroke();c.beginPath();c.moveTo(cx-10,cy-1);c.lineTo(cx+10,cy-1);c.stroke();}// grin
  else if(t==5){c.beginPath();c.arc(cx+2,cy-2,5,0.4,Math.PI-0.4);c.stroke();}// slight
  c.restore();
}
function drawH(c,t,cx,cy,r,co){
  c.save();c.fillStyle=co;
  if(t==0){c.beginPath();c.arc(cx,cy,r+3,Math.PI+0.3,-0.3);c.quadraticCurveTo(cx+r+8,cy-r+5,cx,cy-r-6);c.quadraticCurveTo(cx-r-8,cy-r+5,cx-r-3,cy);c.fill();}
  else if(t==1){c.beginPath();c.arc(cx,cy,r+2,Math.PI+0.4,-0.4);c.fill();for(var i=-2;i<=2;i++){c.beginPath();c.moveTo(cx+i*13-6,cy-r+8);c.lineTo(cx+i*13,cy-r-10+Math.abs(i)*3);c.lineTo(cx+i*13+6,cy-r+8);c.fill();}}
  else if(t==2){c.beginPath();c.arc(cx,cy-2,r+4,Math.PI+0.2,-0.2);c.fill();}
  else if(t==3){c.beginPath();c.arc(cx,cy,r+2,Math.PI+0.3,-0.3);c.fill();for(var i=-2;i<=2;i++){c.beginPath();c.moveTo(cx+i*14-7,cy-r+5);c.lineTo(cx+i*14,cy-r-16);c.lineTo(cx+i*14+7,cy-r+5);c.fill();}}
  else if(t==4){c.beginPath();c.arc(cx,cy-2,r+4,Math.PI+0.1,-0.1);c.fill();c.fillRect(cx-r-4,cy-3,9,50);c.fillRect(cx+r-5,cy-3,9,50);}
  c.restore();
}
function drawX(c,t,clr){
  c.save();var rgb=hexRgb(clr);
  if(t==1){c.fillStyle='#64B5F6';c.beginPath();c.moveTo(138,52);c.quadraticCurveTo(141,44,138,40);c.quadraticCurveTo(135,44,138,52);c.fill();}// sweat
  else if(t==2){c.fillStyle=clr;c.font='bold 18px sans-serif';c.textAlign='center';c.fillText('?',145,50);}
  else if(t==3){c.fillStyle=clr;c.font='bold 18px sans-serif';c.textAlign='center';c.fillText('!',145,50);}
  else if(t==4){c.fillStyle=clr;c.globalAlpha=0.7;c.font='14px sans-serif';c.textAlign='center';c.fillText('\u2726',142,48);c.fillText('\u2726',55,60);c.globalAlpha=1;}
  else if(t==5){c.fillStyle=clr;c.font='bold 14px sans-serif';c.textAlign='center';c.fillText('Z',135,50);c.font='bold 11px sans-serif';c.fillText('z',148,40);c.font='bold 9px sans-serif';c.fillText('z',158,32);}
  else if(t==6){c.font='16px "Segoe UI Emoji","Apple Color Emoji",sans-serif';c.textAlign='center';c.fillText('\uD83D\uDD25',50,65);}
  else if(t==7){c.fillStyle='#64B5F6';c.beginPath();c.moveTo(88,96);c.quadraticCurveTo(90,88,88,84);c.quadraticCurveTo(86,88,88,96);c.fill();c.beginPath();c.moveTo(112,96);c.quadraticCurveTo(114,88,112,84);c.quadraticCurveTo(110,88,112,96);c.fill();}
  c.restore();
}

/* === DATA === */
var D={
dev:{name:"\u7A0B\u5E8F\u5458/\u5F00\u53D1\u8005",icon:"\uD83D\uDCBB",color:"#00ff41",rgb:"0,255,65",
chars:[
{e:2,m:2,h:1,sc:'#2E7D32',p:'\uD83D\uDCBB',x:1,hc:'#5D4037'},
{e:5,m:1,h:2,sc:'#37474F',p:'\uD83D\uDC7B',x:0,hc:'#333'},
{e:2,m:1,h:1,sc:'#1B5E20',p:'\uD83D\uDC1B',x:5,hc:'#5D4037'},
{e:7,m:5,h:0,sc:'#33691E',p:'\uD83D\uDCCB',x:0,hc:'#3E2723'},
{e:0,m:1,h:2,sc:'#2E7D32',p:'\uD83D\uDD27',x:0,hc:'#3E2723'},
{e:2,m:2,h:1,sc:'#388E3C',p:'\uD83D\uDD28',x:1,hc:'#5D4037'},
{e:4,m:3,h:0,sc:'#43A047',p:'\uD83D\uDE80',x:1,hc:'#3E2723'},
{e:6,m:0,h:2,sc:'#4CAF50',p:'\uD83D\uDE0E',x:4,hc:'#3E2723'}],

/* === STATE === */
var cur={ind:null,qi:0,sc:0};
var busy=false;

/* === HELPERS === */
function setN(c,r){var s=document.documentElement.style;s.setProperty('--neon',c);s.setProperty('--nr',r);}
function show(id){var ss=document.querySelectorAll('.screen');for(var i=0;i<ss.length;i++)ss[i].classList.remove('active');void document.getElementById(id).offsetWidth;document.getElementById(id).classList.add('active');document.getElementById(id).scrollTop=0;}

/* === HOME GRID === */
var ks=["dev","pm","ai","work","grad","abroad","design","ops"];
var g=document.getElementById('grid');
for(var i=0;i<ks.length;i++){(function(k){var d=D[k];var c=document.createElement('div');c.className='industry-card';c.innerHTML='<span class="ic">'+d.icon+'</span><div class="nm">'+d.name+'</div>';c.addEventListener('click',function(){startQ(k);});g.appendChild(c);})(ks[i]);}

/* === QUIZ === */
function startQ(k){var d=D[k];cur={ind:k,qi:0,sc:0};setN(d.color,d.rgb);document.getElementById('qi').textContent=d.name;show('quiz-screen');renderQ(true);}

function renderQ(imm){
  var d=D[cur.ind],q=d.questions[cur.qi],t=d.questions.length,n=cur.qi+1;
  document.getElementById('qn').textContent=n+' / '+t;
  document.getElementById('pb').style.width=((n/t)*100)+'%';
  var qe=document.getElementById('qt'),oe=document.getElementById('opts');
  if(imm){qe.classList.remove('fo');oe.classList.remove('fo');setQC(qe,oe,n,q);return;}
  qe.classList.add('fo');oe.classList.add('fo');
  setTimeout(function(){setQC(qe,oe,n,q);qe.classList.remove('fo');oe.classList.remove('fo');},280);
}

function setQC(qe,oe,n,q){
  qe.textContent=n+'. '+q.q;
  var lb=['A','B','C'],h='';
  for(var i=0;i<q.opts.length;i++){h+='<button class="ob" data-s="'+q.opts[i].s+'"><span class="ol">'+lb[i]+'</span>'+q.opts[i].t+'</button>';}
  oe.innerHTML=h;
  var bs=oe.querySelectorAll('.ob');
  for(var j=0;j<bs.length;j++)bs[j].addEventListener('click',optClick);
}

function optClick(e){
  if(busy)return;var b=e.currentTarget;if(b.classList.contains('sel'))return;
  busy=true;
  var all=document.querySelectorAll('#opts .ob');for(var i=0;i<all.length;i++)all[i].classList.remove('sel');
  b.classList.add('sel');cur.sc+=parseInt(b.getAttribute('data-s'));
  setTimeout(function(){cur.qi++;if(cur.qi>=D[cur.ind].questions.length){showR();}else{renderQ(false);}busy=false;},400);
}

/* === RESULT === */
function showR(){
  var d=D[cur.ind],s=cur.sc,r=null;
  for(var i=0;i<d.results.length;i++){if(s>=d.results[i].min&&s<=d.results[i].max){r=d.results[i];break;}}
  if(!r)r=d.results[d.results.length-1];
  var ci=0;for(var i=0;i<d.results.length;i++){if(d.results[i].code===r.code){ci=i;break;}}
  document.getElementById('ri').textContent='\u2014 '+d.name+' \u2014';
  document.getElementById('rc').textContent=r.code;
  document.getElementById('rt').textContent=r.title;
  document.getElementById('rd').textContent=r.desc;
  drawChar(document.getElementById('cc'),d.chars[ci],d.color);
  show('result-screen');
}

function goHome(){setN('#a855f7','168,85,247');show('home-screen');}
